<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pie N Mashupz Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .player {
      position: relative;
      width: 400px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .player img { width: 100%; display: block; }
    .player .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.85) 100%);
      display: flex; flex-direction: column; justify-content: flex-end; padding: 24px;
    }
    .player h2 { color: #fff; font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .player p { color: rgba(255,255,255,0.7); font-size: 13px; margin-bottom: 16px; }
    .controls { display: flex; align-items: center; gap: 12px; }
    .play-btn {
      width: 48px; height: 48px; border-radius: 50%; background: #fff; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s; flex-shrink: 0;
    }
    .play-btn:hover { transform: scale(1.05); }
    .play-btn:active { transform: scale(0.95); }
    .play-btn svg { width: 20px; height: 20px; }
    .play-btn.playing svg { margin-left: 0; }
    .progress-container { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .progress-bar {
      width: 100%; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px;
      overflow: hidden; cursor: pointer; transition: height 0.1s;
    }
    .progress-bar:hover { height: 7px; }
    .progress-fill { height: 100%; background: #fff; width: 0%; will-change: width; }
    .time { display: flex; justify-content: space-between; color: rgba(255,255,255,0.7); font-size: 11px; }
    .loading {
      position: absolute; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; font-size: 14px; gap: 12px;
    }
    .loading.hidden { opacity: 0; pointer-events: none; display: none; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      position: absolute; inset: 0; background: rgba(0,0,0,0.9);
      display: none; align-items: center; justify-content: center;
      color: #ff6b6b; font-size: 14px; text-align: center; padding: 20px;
    }
    .error.show { display: flex; }
  </style>
</head>
<body>
  <div class="player">
    <img src="cover.jpg" alt="Cover" crossorigin="anonymous">
    <div class="overlay">
      <h2>Pie N Mashupz</h2>
      <p id="statusText">Ready to stream</p>
      <div class="controls">
        <button class="play-btn" id="playBtn" aria-label="Play">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="progress-container">
          <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
          <div class="time"><span id="currentTime">0:00</span><span id="duration">--:--</span></div>
        </div>
      </div>
    </div>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <span id="loadingText">Loading...</span>
    </div>
    <div class="error" id="error"></div>
  </div>

  <script>
    const mp3URL = 'https://media.githubusercontent.com/media/Joey90nowt/joe90z/master/hi26ik_restored.mp3';

    const playBtn = document.getElementById('playBtn');
    const progressFill = document.getElementById('progressFill');
    const progressBar = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');
    const loadingEl = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const errorEl = document.getElementById('error');
    const statusText = document.getElementById('statusText');

    let audio = new Audio();
    let isPlaying = false;

    function setStatus(t) { statusText.textContent = t; }
    function showError(msg) { errorEl.textContent = msg; errorEl.classList.add('show'); loadingEl.classList.add('hidden'); }
    function formatTime(s) { return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0'); }

    audio.src = mp3URL;
    audio.preload = 'auto';

    audio.addEventListener('loadedmetadata', () => {
      durationEl.textContent = formatTime(audio.duration);
      loadingEl.classList.add('hidden');
      setStatus('Click play to stream');
    });

    audio.addEventListener('canplay', () => {
      loadingEl.classList.add('hidden');
    });

    audio.addEventListener('timeupdate', () => {
      const pct = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = pct + '%';
      currentTimeEl.textContent = formatTime(audio.currentTime);
    });

    audio.addEventListener('ended', () => {
      isPlaying = false; updateBtn(); progressFill.style.width = '0%'; currentTimeEl.textContent = '0:00';
    });

    audio.addEventListener('error', () => {
      showError('Failed to load audio. Check console.');
      console.error('Audio error:', audio.error);
    });

    audio.addEventListener('waiting', () => setStatus('Buffering...'));
    audio.addEventListener('playing', () => setStatus('Streaming'));

    function togglePlay() {
      if (isPlaying) { audio.pause(); isPlaying = false; }
      else { audio.play(); isPlaying = true; setStatus('Streaming'); }
      updateBtn();
    }

    function updateBtn() {
      playBtn.classList.toggle('playing', isPlaying);
      playBtn.innerHTML = isPlaying
        ? '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
    }

    playBtn.addEventListener('click', togglePlay);

    progressBar.addEventListener('click', (e) => {
      if (!audio.duration) return;
      const rect = progressBar.getBoundingClientRect();
      const ratio = (e.clientX - rect.left) / rect.width;
      audio.currentTime = ratio * audio.duration;
    });
  </script>
</body>
</html>
