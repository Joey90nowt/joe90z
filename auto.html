<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Chapters</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .player {
      position: relative;
      width: 400px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .player img { width: 100%; display: block; transition: opacity 0.4s; }
    .player .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.9) 100%);
      display: flex; flex-direction: column; justify-content: flex-end; padding: 24px;
    }
    .chapter-selector { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .chapter-btn {
      padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3);
      background: transparent; color: rgba(255,255,255,0.7); font-size: 12px;
      cursor: pointer; transition: all 0.2s;
    }
    .chapter-btn:hover { background: rgba(255,255,255,0.1); }
    .chapter-btn.active { background: rgba(255,255,255,0.9); color: #111; border-color: rgba(255,255,255,0.9); }
    .chapter-btn.played { border-color: rgba(255,255,255,0.5); color: rgba(255,255,255,0.5); }
    .track-info { margin-bottom: 12px; }
    .track-info h2 { color: #fff; font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .track-info p { color: rgba(255,255,255,0.6); font-size: 13px; }
    .controls { display: flex; align-items: center; gap: 12px; }
    .play-btn {
      width: 48px; height: 48px; border-radius: 50%; background: #fff; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s; flex-shrink: 0;
    }
    .play-btn:hover { transform: scale(1.05); }
    .play-btn:active { transform: scale(0.95); }
    .play-btn svg { width: 20px; height: 20px; }
    .play-btn.playing svg { margin-left: 0; }
    .progress-container { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .progress-bar {
      width: 100%; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px;
      overflow: hidden; cursor: pointer; transition: height 0.1s;
    }
    .progress-bar:hover { height: 7px; }
    .progress-fill { height: 100%; background: #fff; width: 0%; will-change: width; }
    .time { display: flex; justify-content: space-between; color: rgba(255,255,255,0.6); font-size: 11px; }
    .loading {
      position: absolute; inset: 0; background: rgba(0,0,0,0.9);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #fff; font-size: 14px; gap: 12px;
    }
    .loading.hidden { opacity: 0; pointer-events: none; display: none; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      position: absolute; inset: 0; background: rgba(0,0,0,0.9);
      display: none; align-items: center; justify-content: center;
      color: #ff6b6b; font-size: 14px; text-align: center; padding: 20px;
    }
    .error.show { display: flex; }
    .fade-out { opacity: 0; }
  </style>
</head>
<body>
  <div class="player">
    <img id="coverImg" src="" alt="Cover">
    <div class="overlay">
      <div class="chapter-selector" id="chapterSelector"></div>
      <div class="track-info">
        <h2 id="titleText">Loading...</h2>
        <p id="descText"></p>
      </div>
      <div class="controls">
        <button class="play-btn" id="playBtn" aria-label="Play">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="progress-container">
          <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
          <div class="time"><span id="currentTime">0:00</span><span id="duration">--:--</span></div>
        </div>
      </div>
    </div>
    <div class="loading" id="loading"><div class="spinner"></div><span id="loadingText">Loading...</span></div>
    <div class="error" id="error"></div>
  </div>

  <script>
    const playBtn = document.getElementById('playBtn');
    const progressFill = document.getElementById('progressFill');
    const progressBar = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');
    const durationEl = document.getElementById('duration');
    const loadingEl = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const errorEl = document.getElementById('error');
    const titleText = document.getElementById('titleText');
    const descText = document.getElementById('descText');
    const coverImg = document.getElementById('coverImg');
    const chapterSelector = document.getElementById('chapterSelector');

    let chapters = [];
    let currentChapter = 0;
    let playedChapters = new Set();
    let isPlaying = false;
    let audioCtx = null;
    let sourceNode = null;
    let audioBuffer = null;
    let startTime = 0;
    let pauseOffset = 0;
    let duration = 0;

    function setStatus(t) { descText.textContent = t; }
    function showError(msg) { errorEl.textContent = msg; errorEl.classList.add('show'); loadingEl.classList.add('hidden'); }
    function formatTime(s) { return Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0'); }

    async function loadChapters() {
      try {
        loadingText.textContent = 'Loading chapters...';
        const r = await fetch('chapters.json');
        if (!r.ok) throw new Error('Failed to load chapters.json');
        chapters = await r.json();
        buildChapterSelector();
        loadChapter(currentChapter, true);
      } catch(e) {
        showError('Failed to load: ' + e.message);
      }
    }

    function buildChapterSelector() {
      chapterSelector.innerHTML = '';
      chapters.forEach((ch, i) => {
        const btn = document.createElement('button');
        btn.className = 'chapter-btn' + (i === currentChapter ? ' active' : '');
        btn.textContent = ch.title;
        btn.id = 'chbtn' + i;
        btn.addEventListener('click', () => playChapter(i));
        chapterSelector.appendChild(btn);
      });
    }

    function updateChapterButtons() {
      chapters.forEach((ch, i) => {
        const btn = document.getElementById('chbtn' + i);
        if (!btn) return;
        btn.classList.remove('active', 'played');
        if (i === currentChapter) btn.classList.add('active');
        else if (playedChapters.has(i)) btn.classList.add('played');
      });
    }

    async function loadChapter(index, preLoad = false) {
      try {
        const ch = chapters[index];
        titleText.textContent = ch.title;
        setStatus('Loading...');
        loadingEl.classList.remove('hidden');

        // Load cover immediately
        coverImg.src = ch.cover;

        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        setStatus('Fetching audio...');
        const resp = await fetch(ch.mp3);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);

        setStatus('Decoding audio...');
        const arrayBuffer = await resp.arrayBuffer();
        audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        duration = audioBuffer.duration;
        durationEl.textContent = formatTime(duration);

        loadingEl.classList.add('hidden');
        setStatus(preLoad ? 'Ready' : 'Loaded');
      } catch(e) {
        showError('Failed to load audio: ' + e.message);
      }
    }

    function startPlayback() {
      if (!audioBuffer) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      stopPlayback();

      sourceNode = audioCtx.createBufferSource();
      sourceNode.buffer = audioBuffer;
      sourceNode.connect(audioCtx.destination);
      sourceNode.onended = () => {
        if (isPlaying) onTrackEnded();
      };
      startTime = audioCtx.currentTime - pauseOffset;
      sourceNode.start(0, pauseOffset);
      isPlaying = true;
      updateBtn();
      trackProgress();
    }

    function stopPlayback() {
      if (sourceNode) {
        try { sourceNode.stop(); } catch(e) {}
        sourceNode.disconnect();
        sourceNode = null;
      }
    }

    function trackProgress() {
      if (!isPlaying) return;
      const elapsed = audioCtx.currentTime - startTime;
      if (elapsed >= duration) {
        onTrackEnded();
        return;
      }
      pauseOffset = elapsed;
      progressFill.style.width = (elapsed / duration * 100) + '%';
      currentTimeEl.textContent = formatTime(elapsed);
      requestAnimationFrame(trackProgress);
    }

    function onTrackEnded() {
      stopPlayback();
      isPlaying = false;
      pauseOffset = 0;
      playedChapters.add(currentChapter);
      updateChapterButtons();
      progressFill.style.width = '0%';
      currentTimeEl.textContent = '0:00';

      if (currentChapter < chapters.length - 1) {
        currentChapter++;
        playChapter(currentChapter);
      } else {
        updateBtn();
        setStatus('All chapters finished');
      }
    }

    function playChapter(index) {
      if (index !== currentChapter || !audioBuffer) {
        currentChapter = index;
        updateChapterButtons();
        loadChapter(index).then(() => {
          pauseOffset = 0;
          startPlayback();
          setStatus('Playing');
        });
      } else {
        pauseOffset = 0;
        startPlayback();
        setStatus('Playing');
      }
    }

    function togglePlay() {
      if (!audioBuffer) return;
      if (isPlaying) {
        pauseOffset = audioCtx.currentTime - startTime;
        stopPlayback();
        isPlaying = false;
        setStatus('Paused');
      } else {
        startPlayback();
        setStatus('Playing');
      }
      updateBtn();
    }

    function updateBtn() {
      playBtn.classList.toggle('playing', isPlaying);
      playBtn.innerHTML = isPlaying
        ? '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
    }

    playBtn.addEventListener('click', togglePlay);

    progressBar.addEventListener('click', (e) => {
      if (!audioBuffer) return;
      const rect = progressBar.getBoundingClientRect();
      const ratio = (e.clientX - rect.left) / rect.width;
      const targetTime = ratio * duration;
      if (isPlaying) {
        pauseOffset = targetTime;
        stopPlayback();
        startPlayback();
      } else {
        pauseOffset = targetTime;
      }
      progressFill.style.width = (ratio * 100) + '%';
      currentTimeEl.textContent = formatTime(targetTime);
    });

    loadChapters();
  </script>
</body>
</html>
